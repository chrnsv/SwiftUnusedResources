name: Tests

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Build
        run: swift build --build-tests
        env:
          SKIP_SWIFTLINT: "1"

      - name: Run tests
        run: swift test --skip-build
        env:
          SKIP_SWIFTLINT: "1"

  lint:
    name: SwiftLint (strict)
    runs-on: ubuntu-latest
    container: ghcr.io/realm/swiftlint:0.63.2
    steps:
      - uses: actions/checkout@v5

      - name: Lint
        run: swiftlint lint --strict --reporter github-actions-logging Sources Tests Plugins
