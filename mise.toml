[tasks.build]
description = "Build release binary"
run = "SKIP_SWIFTLINT=1 swift build -c release --arch arm64"

[tasks.artifactbundle]
description = "Create artifact bundle"
depends = ["build"]
run = '''
#!/usr/bin/env bash
set -e

VERSION=$1
if [ -z "$VERSION" ]; then
  echo "Error: Version argument is required. Usage: mise run artifactbundle <version>"
  exit 1
fi

echo "Creating artifact bundle for SUR version $VERSION..."

# Get executable path
BIN_PATH=$(swift build -c release --arch arm64 --show-bin-path)
EXECUTABLE_PATH="$BIN_PATH/sur"

# Define bundle paths
BUNDLE_NAME="sur-$VERSION.artifactbundle"
BUNDLE_DIR="${BUNDLE_NAME}_tmp"
mkdir -p "$BUNDLE_DIR/bin"

# Copy executable
cp "$EXECUTABLE_PATH" "$BUNDLE_DIR/bin/sur"

# Create info.json
cat <<EOF > "$BUNDLE_DIR/info.json"
{
    "schemaVersion": "1.0",
    "artifacts": {
        "sur": {
            "version": "$VERSION",
            "type": "executable",
            "variants": [
                {
                    "path": "bin/sur",
                    "supportedTriples": ["arm64-apple-macosx"]
                }
            ]
        }
    }
}
EOF

# Compress the bundle
BUNDLE_ZIP="$BUNDLE_NAME.zip"
rm -f "$BUNDLE_ZIP"
(cd "$BUNDLE_DIR" && zip -q -r "../$BUNDLE_ZIP" .)

# Clean up
rm -rf "$BUNDLE_DIR"

echo "Artifact bundle created: $BUNDLE_ZIP"
'''

[tasks.update-version]
description = "Update version in podspec and Package.swift"
run = '''
#!/usr/bin/env bash
set -e
VERSION=$1
if [ -z "$VERSION" ]; then
  echo "Error: Version argument is required. Usage: mise run update-version <version>"
  exit 1
fi

# 1. Update podspec version
sed -i '' -E "s/(spec.version[[:space:]]*=[[:space:]]*')[^']+'/\1$VERSION'/" SwiftUnusedResources.podspec

# 2. Update Package.swift version in URL
sed -i '' -E "s|(releases/download/)[^/]+/(sur-).+(\.artifactbundle\.zip)|\1$VERSION/\2$VERSION\3|" Package.swift

# 3. Update checksum (if zip exists)
BUNDLE_ZIP="sur-$VERSION.artifactbundle.zip"
if [ -f "$BUNDLE_ZIP" ]; then
    echo "Found $BUNDLE_ZIP, updating checksum..."
    CHECKSUM=$(swift package compute-checksum "$BUNDLE_ZIP")
    sed -i '' -E "s/(checksum:[[:space:]]*\")[^\"]+(\")/\1$CHECKSUM\2/" Package.swift
    echo "Checksum updated: $CHECKSUM"
fi

echo "Successfully updated version to $VERSION"
'''

[tasks.publish]
description = "Publish release to GitHub (draft → inspect → finalize)"
run = '''
#!/usr/bin/env bash
set -e
VERSION=$1
if [ -z "$VERSION" ]; then
  echo "Error: Version argument is required. Usage: mise run publish <version>"
  exit 1
fi

BUNDLE_ZIP="sur-$VERSION.artifactbundle.zip"

if [ ! -f "$BUNDLE_ZIP" ]; then
    echo "Error: $BUNDLE_ZIP not found. Run 'mise run artifactbundle $VERSION' first."
    exit 1
fi

if ! command -v gh &> /dev/null; then
    echo "Error: GitHub CLI (gh) is not installed. Install with: brew install gh"
    exit 1
fi

if ! command -v jq &> /dev/null; then
    echo "Error: jq is not installed. Install with: brew install jq"
    exit 1
fi

BRANCH=$(git rev-parse --abbrev-ref HEAD)

# Step 1: Create a draft release and upload the artifact
echo "Creating draft release $VERSION (target: $BRANCH)..."
gh release create "$VERSION" "$BUNDLE_ZIP" --target "$BRANCH" --title "$VERSION" --generate-notes --draft

# Step 2: Extract asset URL and update Package.swift
echo ""
ASSET_URL=$(gh release view "$VERSION" --json assets \
  | jq -r --arg name "$BUNDLE_ZIP" '.assets[] | select(.name == $name) | .url')

if [ -z "$ASSET_URL" ]; then
    echo "Error: Could not retrieve asset URL for $BUNDLE_ZIP from the draft release."
    exit 1
fi

echo "Asset URL: $ASSET_URL"

CHECKSUM=$(swift package compute-checksum "$BUNDLE_ZIP")
echo "Checksum:  $CHECKSUM"

sed -i '' -E "s|url: \"https://[^\"]+\"|url: \"$ASSET_URL\"|" Package.swift
sed -i '' -E "s/(checksum: \")[^\"]+(\")/\1$CHECKSUM\2/" Package.swift
echo "Package.swift updated."

# Step 3: Commit and push Package.swift
git add Package.swift
git commit -m "chore: update binaryTarget URL and checksum for $VERSION"
git push

# Step 4: Finalize the release
echo ""
echo "Finalizing release $VERSION..."
gh release edit "$VERSION" --draft=false

echo "Release $VERSION published successfully."
'''
